<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Analytics Ranking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #51cf66;
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
            --bg-gradient: linear-gradient(135deg, #f8faf9 0%, #e9f2ee 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg-gradient);
            color: #2c3e50;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 800px; margin: 40px auto; }

        header { text-align: center; margin-bottom: 50px; }
        h1 { font-family: 'Outfit', sans-serif; font-size: 2.8rem; color: #2b8a3e; margin: 0; }
        .subtitle { color: #667c71; font-size: 1.1rem; opacity: 0.8; }

        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 15px; margin-bottom: 50px; }
        .podium-card { background: var(--card-bg); border-radius: 24px; padding: 25px 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: relative; transition: transform 0.3s ease; border: 1px solid rgba(0,0,0,0.05); }
        .podium-card:hover { transform: translateY(-8px); }
        
        .rank-badge { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; font-family: 'Outfit'; font-size: 1.2rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .rank-1 .rank-badge { background: var(--gold); }
        .rank-2 .rank-badge { background: var(--silver); }
        .rank-3 .rank-badge { background: var(--bronze); }

        .rank-1 { width: 280px; height: 320px; order: 2; z-index: 2; border-bottom: 4px solid var(--gold); }
        .rank-2 { width: 230px; height: 280px; order: 1; border-bottom: 4px solid var(--silver); }
        .rank-3 { width: 230px; height: 260px; order: 3; border-bottom: 4px solid var(--bronze); }

        .sticker-img-container {
            width: 110px; height: 110px; margin: 10px auto 15px;
            overflow: hidden; border-radius: 12px; background: white;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.03);
            display: flex; align-items: center; justify-content: center;
        }
        .rank-1 .sticker-img-container { width: 140px; height: 140px; }

        .sticker-img {
            width: 100px; height: 100px;
            background-image: url('stickers_sheet.png');
            background-size: 837px 1024px;
            background-repeat: no-repeat;
        }
        .rank-1 .sticker-img { width: 130px; height: 130px; }

        .count { font-family: 'Outfit'; font-size: 1.8rem; font-weight: 700; color: #2b8a3e; margin: 0; }
        .rank-1 .count { font-size: 2.4rem; }
        .label { font-size: 0.75rem; color: #adb5bd; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
        .sticker-name { font-weight: 700; color: #495057; font-size: 1rem; }

        .ranking-list { background: var(--card-bg); border-radius: 24px; padding: 10px; box-shadow: 0 8px 30px rgba(0,0,0,0.03); }
        .list-item { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid rgba(0,0,0,0.03); border-radius: 12px; transition: background 0.2s; }
        .list-item:hover { background: #f1f8f3; }
        .list-rank { width: 45px; font-family: 'Outfit'; font-size: 1.2rem; font-weight: 700; color: #dee2e6; }
        .list-sticker-box { width: 70px; height: 70px; overflow: hidden; border-radius: 10px; margin-right: 20px; background: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .list-sticker { width: 64px; height: 64px; background-image: url('stickers_sheet.png'); background-size: 837px 1024px; background-repeat: no-repeat; }
        
        .list-info { flex-grow: 1; }
        .list-name { font-weight: 700; font-size: 1rem; color: #495057; }
        .list-count { font-family: 'Outfit'; font-size: 1.2rem; color: #2b8a3e; font-weight: 700; }
        .unit { font-size: 0.8rem; font-weight: normal; color: #adb5bd; margin-left: 2px; }

        footer { text-align: center; margin-top: 40px; color: #adb5bd; font-size: 0.8rem; }

        @media (max-width: 600px) {
            .podium { flex-direction: column; align-items: center; }
            .podium-card { width: 100% !important; height: auto !important; order: unset !important; padding: 30px 20px; }
        }
    </style>
</head>
<body>

        function getBgPosition(row, col) {

            return `-${col * cellW + offsetX}px -${row * cellH + offsetY}px`;
        }

        const podium = document.getElementById('podium');
        const list = document.getElementById('ranking-list');

        rankingData.forEach(item => {
            const pos = getBgPosition(item.row, item.col);
            if (item.rank <= 3) {
                const card = document.createElement('div');
                card.className = `podium-card rank-${item.rank}`;
                card.innerHTML = `
                    <div class="rank-badge">${item.rank === 1 ? '🥇' : (item.rank === 2 ? '🥈' : '🥉')}</div>

                    <div class="sticker-name">No. ${item.id}</div>
                `;
                podium.appendChild(card);
            } else {
                const row = document.createElement('div');
                row.className = 'list-item';
                row.innerHTML = `
                    <div class="list-rank">${item.rank}</div>

</body>
</html>
