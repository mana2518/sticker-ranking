<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Ranking - Perfect Visibility</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #51cf66;
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
            --bg-gradient: linear-gradient(135deg, #f8faf9 0%, #e9f2ee 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg-gradient);
            color: #2c3e50;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 900px; margin: 40px auto; }

        header { text-align: center; margin-bottom: 50px; }
        h1 { font-family: 'Outfit', sans-serif; font-size: 3rem; color: #2b8a3e; margin: 0; letter-spacing: -0.01em; }
        .subtitle { color: #667c71; font-size: 1.2rem; opacity: 0.8; margin-top: 5px; }

        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 20px; margin-bottom: 60px; padding: 0 10px; }
        
        .podium-card { 
            background: var(--card-bg); 
            border-radius: 32px; 
            padding: 40px 20px; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.06); 
            position: relative; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid rgba(255,255,255,0.8);
        }
        
        .podium-card:hover { transform: translateY(-12px); box-shadow: 0 30px 60px rgba(43, 138, 62, 0.12); }
        
        .rank-badge { 
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%); 
            width: 60px; height: 60px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; color: white; font-family: 'Outfit'; font-size: 1.8rem; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
        }
        
        .rank-1 .rank-badge { background: var(--gold); }
        .rank-2 .rank-badge { background: var(--silver); }
        .rank-3 .rank-badge { background: var(--bronze); }

        .rank-1 { width: 340px; height: 420px; order: 2; z-index: 2; border-bottom: 6px solid var(--gold); }
        .rank-2 { width: 280px; height: 360px; order: 1; border-bottom: 6px solid var(--silver); }
        .rank-3 { width: 280px; height: 340px; order: 3; border-bottom: 6px solid var(--bronze); }

        .sticker-frame {
            width: 180px; height: 180px; margin: 10px auto 25px;
            overflow: hidden; border-radius: 20px; background: white;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.03);
            display: flex; align-items: center; justify-content: center;
        }
        .rank-1 .sticker-frame { width: 220px; height: 220px; }

        .sticker-view, .list-sticker-view {
            width: 100%; height: 100%;
            background-image: url('stickers_sheet.png');
            background-repeat: no-repeat;
        }

        .count { font-family: 'Outfit'; font-size: 2.2rem; font-weight: 700; color: #2b8a3e; margin: 0; }
        .rank-1 .count { font-size: 3.2rem; }
        .label { font-size: 0.9rem; color: #adb5bd; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 6px; }
        .sticker-name { font-weight: 700; color: #495057; font-size: 1.2rem; }

        .ranking-list { background: var(--card-bg); border-radius: 32px; padding: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); }
        .list-item { 
            display: flex; align-items: center; padding: 15px 25px; 
            border-bottom: 1px solid rgba(0,0,0,0.03); border-radius: 18px; 
            transition: all 0.3s ease; 
        }
        .list-item:hover { background: #f1f8f3; transform: translateX(10px); }
        .list-rank { width: 60px; font-family: 'Outfit'; font-size: 1.6rem; font-weight: 700; color: #ced4da; }
        
        .list-sticker-frame { 
            width: 90px; height: 90px; overflow: hidden; border-radius: 15px; 
            margin-right: 25px; background: white; 
            display: flex; align-items: center; justify-content: center; 
            flex-shrink: 0; box-shadow: 0 5px 15px rgba(0,0,0,0.04);
        }
        
        .list-info { flex-grow: 1; }
        .list-name { font-weight: 700; font-size: 1.1rem; color: #495057; margin-bottom: 2px; }
        .list-count { font-family: 'Outfit'; font-size: 1.5rem; color: #2b8a3e; font-weight: 700; }
        .unit { font-size: 0.9rem; font-weight: normal; color: #adb5bd; margin-left: 5px; }

        @media (max-width: 800px) {
            .podium { flex-direction: column; align-items: center; gap: 40px; }
            .rank-1, .rank-2, .rank-3 { width: 100% !important; height: auto !important; order: unset !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Sticker Ranking</h1>
            <div class="subtitle">LINEスタンプ送信数パフォーマンス概要</div>
        </header>
        <div id="podium" class="podium"></div>
        <div id="ranking-list" class="ranking-list"></div>
    </div>

    <script>
        const rankingData = [
            { "rank": 1, "id": "01", "count": "22,520", "row": 0, "col": 2 },
            { "rank": 2, "id": "02", "count": "12,800", "row": 0, "col": 3 },
            { "rank": 3, "id": "40", "count": "10,340", "row": 5, "col": 6 },
            { "rank": 4, "id": "28", "count": "8,640", "row": 4, "col": 1 },
            { "rank": 5, "id": "07", "count": "8,240", "row": 1, "col": 1 },
            { "rank": 6, "id": "18", "count": "7,100", "row": 2, "col": 5 },
            { "rank": 7, "id": "05", "count": "6,840", "row": 0, "col": 6 },
            { "rank": 8, "id": "09", "count": "5,980", "row": 1, "col": 3 },
            { "rank": 9, "id": "24", "count": "5,240", "row": 3, "col": 4 },
            { "rank": 10, "id": "20", "count": "5,060", "row": 3, "col": 0 },
            { "rank": 11, "id": "11", "count": "4,620", "row": 1, "col": 5 },
            { "rank": 12, "id": "34", "count": "4,460", "row": 5, "col": 0 },
            { "rank": 13, "id": "12", "count": "3,920", "row": 1, "col": 6 },
            { "rank": 14, "id": "06", "count": "3,740", "row": 1, "col": 0 },
            { "rank": 15, "id": "03", "count": "3,560", "row": 0, "col": 4 },
            { "rank": 16, "id": "10", "count": "3,380", "row": 1, "col": 4 },
            { "rank": 17, "id": "26", "count": "3,240", "row": 3, "col": 6 },
            { "rank": 18, "id": "35", "count": "3,180", "row": 5, "col": 1 },
            { "rank": 19, "id": "19", "count": "2,800", "row": 2, "col": 6 },
            { "rank": 20, "id": "13", "count": "2,620", "row": 2, "col": 0 },
            { "rank": 21, "id": "04", "count": "2,280", "row": 0, "col": 5 },
            { "rank": 22, "id": "15", "count": "2,140", "row": 2, "col": 2 },
            { "rank": 23, "id": "30", "count": "2,020", "row": 4, "col": 3 },
            { "rank": 24, "id": "14", "count": "1,980", "row": 2, "col": 1 },

            { "rank": 26, "id": "21", "count": "1,900", "row": 3, "col": 1 },
            { "rank": 27, "id": "29", "count": "1,860", "row": 4, "col": 2 },
            { "rank": 28, "id": "23", "count": "1,220", "row": 3, "col": 3 },
            { "rank": 29, "id": "39", "count": "1,180", "row": 5, "col": 5 },
            { "rank": 30, "id": "16", "count": "1,100", "row": 2, "col": 3 },
            { "rank": 31, "id": "36", "count": "1,080", "row": 5, "col": 2 },
            { "rank": 32, "id": "17", "count": "1,080", "row": 2, "col": 4 },
            { "rank": 33, "id": "08", "count": "1,040", "row": 1, "col": 2 },
            { "rank": 34, "id": "27", "count": "1,020", "row": 4, "col": 0 },
            { "rank": 35, "id": "33", "count": "980", "row": 4, "col": 6 },
            { "rank": 36, "id": "25", "count": "680", "row": 3, "col": 5 },
            { "rank": 37, "id": "37", "count": "640", "row": 5, "col": 3 },
            { "rank": 38, "id": "32", "count": "620", "row": 4, "col": 5 },
            { "rank": 39, "id": "38", "count": "160", "row": 5, "col": 4 },
            { "rank": 40, "id": "22", "count": "60", "row": 3, "col": 2 }
        ];

        function setStickerPos(item, frameSize) {
            const cellW = 837 / 7;
            const cellH = 1024 / 6;
            const stickerCenterX = (item.col + 0.5) * cellW;
            const stickerCenterY = (item.row + 0.68) * cellH; // Skip label at top
            
            const scale = frameSize / 110;
            const bgW = 837 * scale;
            const bgH = 1024 * scale;
            
            const posX = (frameSize / 2) - stickerCenterX * scale;
            const posY = (frameSize / 2) - stickerCenterY * scale;
            
            return `background-size: ${bgW}px ${bgH}px; background-position: ${posX}px ${posY}px;`;
        }

        const podium = document.getElementById('podium');
        const list = document.getElementById('ranking-list');

        rankingData.forEach(item => {
            if (item.rank <= 3) {
                const frameSize = item.rank === 1 ? 220 : 180;
                const style = setStickerPos(item, frameSize);
                const card = document.createElement('div');
                card.className = `podium-card rank-${item.rank}`;
                card.innerHTML = `
                    <div class="rank-badge">${['🥇','🥈','🥉'][item.rank-1]}</div>
                    <div class="sticker-frame">
                        <div class="sticker-view" style="${style}"></div>
                    </div>
                    <div class="label">Sent Count</div>
                    <div class="count">${item.count}</div>
                    <div class="sticker-name">No. ${item.id}</div>
                `;
                podium.appendChild(card);
            } else {
                const style = setStickerPos(item, 90);
                const row = document.createElement('div');
                row.className = 'list-item';
                row.innerHTML = `
                    <div class="list-rank">${item.rank}</div>
                    <div class="list-sticker-frame">
                        <div class="list-sticker-view" style="${style}"></div>
                    </div>
                    <div class="list-info">
                        <div class="list-name">Sticker ${item.id}</div>
                        <div class="list-count">${item.count}<span class="unit">sends</span></div>
                    </div>
                `;
                list.appendChild(row);
            }
        });
    </script>
</body>
</html>
